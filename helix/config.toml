theme = "catppuccin_mocha_transparent"

[editor]
scrolloff = 8
mouse = true
line-number = "relative"
cursorline = true
auto-save = { focus-lost = true, after-delay.enable = true, after-delay.timeout = 1000 }
bufferline = "multiple"
color-modes = true
true-color = true
rulers = [80, 120]
idle-timeout = 50
completion-timeout = 50

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "register", "position", "file-encoding"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true
character = "│"
skip-levels = 1

[editor.file-picker]
hidden = false
git-ignore = true

[editor.soft-wrap]
enable = true

[keys.normal]
# Quick save
"C-s" = ":write"
# Buffer navigation
"H" = "goto_previous_buffer"
"L" = "goto_next_buffer"
# Close buffer
"C-w" = ":buffer-close"
# Quick reload
"C-r" = ":reload-all"
# Quick line movement
"A-j" = ["extend_to_line_bounds", "delete_selection", "paste_after"]
"A-k" = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]

[keys.insert]
"C-s" = [":write"]
