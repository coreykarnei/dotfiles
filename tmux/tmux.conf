# ─── General ──────────────────────────────────────────────
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -g xterm-keys on
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g status-interval 5
setw -g automatic-rename off
set -g allow-rename off

# ─── Prefix ──────────────────────────────────────────────
# Use Ctrl-a instead of Ctrl-b (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Pane Splitting ──────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -n "terminal" -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Pane Navigation (Alt + arrow, no prefix needed) ────
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vim-style pane navigation with prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Pane Resizing (prefix + Shift+arrow) ───────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window Navigation ──────────────────────────────────
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ─── Session Switching ───────────────────────────────────
bind s choose-tree -sZ
bind S command-prompt -p "New session name:" "new-session -s '%%'"

# ─── Copy Mode (vi style) ───────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── Reload Config ───────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ─── Status Bar ──────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#1e1e2e] "
set -g status-right "#[fg=#6c7086]  %H:%M  %b %d "

# Window status
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#a6e3a1,bold] #I:#W #[fg=#a6e3a1,bg=#1e1e2e]"
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message style
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"
